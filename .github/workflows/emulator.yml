# Instrumented smoke tests on emulators — the closest CI gets to a real
# phone. Runs the androidTest suite on API 26 (the minSdk floor) and API 35
# (the target), both on AOSP images WITHOUT Google APIs: that is the
# de-Googled (GrapheneOS/CalyxOS-like) condition, including "no TTS engine
# installed" on the stripped images. See docs/TESTING_AND_CI.md.
#
# Emulators are slow and flaky compared to the JVM suite, so this runs on
# main pushes and nightly rather than blocking every PR iteration.
name: Emulator smoke tests

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *" # nightly
  workflow_dispatch:

concurrency:
  group: emulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 26 # minSdk floor
            target: default # AOSP, no Google APIs
          - api-level: 35 # targetSdk
            target: default
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run smoke tests on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-report-api${{ matrix.api-level }}
          path: app/build/reports/androidTests
          if-no-files-found: ignore
