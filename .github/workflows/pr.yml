# Per-pull-request checks. Fast, JVM-only gates that don't need an emulator:
# build, unit + screenshot tests, lint, the permission "manifest guard", and
# an APK-size report. The heavier emulator matrix (emulator.yml) is added in a
# later milestone. See docs/TESTING_AND_CI.md.
name: PR checks

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Manifest guard (permission allowlist + no INTERNET)
        # The app's privacy promise is enforced here, not just documented:
        # fail the build if any permission outside the approved allowlist
        # appears, or if INTERNET ever shows up. Widen ALLOWED only when a
        # milestone legitimately needs a new permission (see DECISIONS.md).
        run: |
          set -euo pipefail
          MANIFEST=app/src/main/AndroidManifest.xml
          # Widened for the alarm feature per DECISIONS.md D-020 (still no
          # INTERNET, no storage, no location — see the manifest's comment).
          ALLOWED='FOREGROUND_SERVICE|FOREGROUND_SERVICE_MEDIA_PLAYBACK|POST_NOTIFICATIONS|USE_EXACT_ALARM|SCHEDULE_EXACT_ALARM|USE_FULL_SCREEN_INTENT|RECEIVE_BOOT_COMPLETED|VIBRATE'
          # Extract every android.permission.* requested in the source manifest.
          perms=$(grep -oE 'android\.permission\.[A-Z_]+' "$MANIFEST" | sort -u || true)
          if echo "$perms" | grep -q 'android.permission.INTERNET'; then
            echo "::error::INTERNET permission is forbidden in this app."
            exit 1
          fi
          bad=$(echo "$perms" | sed 's/android.permission.//' | grep -vE "^($ALLOWED)$" || true)
          if [ -n "$bad" ]; then
            echo "::error::Permission(s) not in the allowlist: $bad"
            exit 1
          fi
          echo "Manifest permission check passed. Requested: ${perms:-(none)}"

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Screenshot tests (verify against committed goldens)
        run: ./gradlew verifyRoborazziDebug

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Assemble release + report APK size
        run: |
          set -euo pipefail
          ./gradlew assembleRelease
          apk=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          bytes=$(stat -c%s "$apk")
          mb=$(awk "BEGIN{printf \"%.2f\", $bytes/1048576}")
          echo "Release APK: $mb MB ($bytes bytes)"
          # Budget is 4 MB (docs/ARCHITECTURE.md). Fail if exceeded.
          if [ "$bytes" -gt 4194304 ]; then
            echo "::error::Release APK ${mb} MB exceeds the 4 MB budget."
            exit 1
          fi

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-report
          path: app/build/outputs/roborazzi
          if-no-files-found: ignore
